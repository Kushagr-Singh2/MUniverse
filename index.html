<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <title>MUniverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" href="images/sqLogo.png">


</head>
<body>
<div class="page-glow"></div>
<nav id="navbar">
  <a href="index.html" class="logo">
    <img id="sqLogoImg" src="images/sqLogo.png" alt="logo" class="logo-icon">
    <img id="txtLogoImg" src="images/txtLogo.png" alt="MUniverse" class="logo-text">
  </a>
  <div class="nav-right">
    <div id="openSidebar">👨</div>
  </div>
</nav>

<div class="container">
  <div class="create-post">
    <div class="create-top">
      <div class="avatar" id="createAvatar">?</div>
      <div class="create-label" id="createLabel">What's on your mind?</div>
    </div>
    <textarea id="postInput" placeholder="Share something with Manipal..."></textarea>
    <div class="create-bottom">
      <button id="postBtn">Post it ✦</button>
    </div>
  </div>

  <div class="feed-label">
    <span>Recent Posts</span>
    <div class="feed-label-line"></div>
  </div>
  <div id="feed"></div>
</div>

<div id="sidebar">
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebarAvatar">?</div>
    <div>
      <div class="sidebar-name" id="sidebarName">...</div>
      <div class="sidebar-uni">Manipal University Jaipur</div>
    </div>
  </div>
  <div class="sidebar-item"><span class="si-icon">👤</span> View Profile</div>
  <div class="sidebar-item"><span class="si-icon">⚙️</span> Settings</div>
  <div class="sidebar-item" id="logoutBtn"><span class="si-icon">🚪</span> Logout</div>
</div>

<div id="toast"></div>

<script src="Js/frontend-index.js"></script>
</body>
</html>
